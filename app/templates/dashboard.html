<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>Task Dashboard</h2>

<h3>Add Task</h3>

<form action="/add_task" method="post">
    Title: <input type="text" name="title"><br>
    Description: <input type="text" name="desc"><br>
    Deadline: <input type="date" name="deadline"><br>
    Priority:
    <select name="priority">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
    </select><br><br>

    <button type="submit">Add Task</button>
</form>

<h3>Your Tasks</h3>

<table border="1">
<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for t in tasks %}
<tr>
    <td>{{ t[0] }}</td>
    <td>{{ t[2] }}</td>
    <td>{{ t[7] }}</td>
    <td>
        <a href="/complete/{{ t[0] }}">Complete</a>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
